# HDMI left: 4K@60，scale 1.67
monitor = HDMI-A-2, disable

# DP right：3440x1440@143.97，auto-right
monitor = DP-2, 3440x1440@143.97501, auto-right, 1

# ---------- Basics ----------
$mod = SUPER
$filemanager = thunar
$terminal = kitty

# ---------- NVIDIA / Wayland compatibility ----------
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = LIBVA_DRIVER_NAME,nvidia
env = GTK_IM_MODULE,fcitx
env = QT_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx
env = SDL_IM_MODULE,fcitx

# ---------- Autostart essentials ----------
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/libexec/polkit-gnome-authentication-agent-1
exec-once = xdg-desktop-portal-hyprland
exec-once = xdg-desktop-portal
# exec-once = swww-daemon
exec-once = mako
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent
exec-once = fcitx5 -d
exec-once = waybar
exec-once = blueman-applet
exec-once = nm-applet
exec-once = systemctl --user start hypridle.service
exec-once = wl-paste --watch cliphist store
exec-once = hyprpaper
exec-once = sh -c 'sleep 3 && keepassxc'

# ---------- Keybinds ----------
bind = ALT, SPACE, exec, wofi --show drun
bind = ALT, RETURN, exec, $terminal
bind = ALT, T, exec, $filemanager
bind = ALT, Q, killactive
bind = ALT, M, exit
bind = ALT, L, exec, hyprlock
bind = CTRL ALT, V, exec, sh -lc 'cliphist list | wofi --dmenu -i -p "Clipboard" | cliphist decode | wl-copy; wtype -M ctrl -k v -m ctrl'
# Screenshot (optional if you installed grim/slurp)
bind = ALT SHIFT, 4, exec, grim -g "$(slurp)" - | wl-copy

# mako
# Alt + N：恢复最近一条通知
bind = ALT, N, exec, makoctl restore

# Alt + Shift + N：切换 reading 模式（有则关，无则开）
bind = ALT SHIFT, N, exec, sh -c 'makoctl mode | grep -qx reading && makoctl mode -r reading || makoctl mode -a reading'

# KeePassXC
bind = ALT, K, exec, keepassxc
bind = ALT SHIFT, K, togglespecialworkspace, keepass

# numbers: focus (per monitor)
bind = $mod, 1, focusworkspaceoncurrentmonitor, 1
bind = $mod, 2, focusworkspaceoncurrentmonitor, 2
bind = $mod, 3, focusworkspaceoncurrentmonitor, 3
bind = $mod, 4, focusworkspaceoncurrentmonitor, 4
bind = $mod, 5, focusworkspaceoncurrentmonitor, 5
bind = $mod, 6, focusworkspaceoncurrentmonitor, 6
bind = $mod, 7, focusworkspaceoncurrentmonitor, 7
bind = $mod, 8, focusworkspaceoncurrentmonitor, 8
bind = $mod, 9, focusworkspaceoncurrentmonitor, 9
bind = $mod, 0, focusworkspaceoncurrentmonitor, 10


# numbers: move window
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10


# --- Letter workspaces (A–Z, skipping I/J/K/L) ---
# Focus workspace on current monitor
bind = $mod, A, focusworkspaceoncurrentmonitor, name:A
bind = $mod, B, focusworkspaceoncurrentmonitor, name:B
bind = $mod, C, focusworkspaceoncurrentmonitor, name:C
bind = $mod, D, focusworkspaceoncurrentmonitor, name:D
bind = $mod, E, focusworkspaceoncurrentmonitor, name:E
bind = $mod, F, focusworkspaceoncurrentmonitor, name:F
bind = $mod, G, focusworkspaceoncurrentmonitor, name:G
bind = $mod, H, focusworkspaceoncurrentmonitor, name:H
# I/J/K/L skipped (used for focus/move)
# bind = $mod, I, focusworkspaceoncurrentmonitor, name:I
# bind = $mod, J, focusworkspaceoncurrentmonitor, name:J
# bind = $mod, K, focusworkspaceoncurrentmonitor, name:K
# bind = $mod, L, focusworkspaceoncurrentmonitor, name:L
bind = $mod, M, focusworkspaceoncurrentmonitor, name:M
bind = $mod, N, focusworkspaceoncurrentmonitor, name:N
bind = $mod, O, focusworkspaceoncurrentmonitor, name:O
bind = $mod, P, focusworkspaceoncurrentmonitor, name:P
bind = $mod, Q, focusworkspaceoncurrentmonitor, name:Q
bind = $mod, R, focusworkspaceoncurrentmonitor, name:R
bind = $mod, S, focusworkspaceoncurrentmonitor, name:S
bind = $mod, T, focusworkspaceoncurrentmonitor, name:T
bind = $mod, U, focusworkspaceoncurrentmonitor, name:U
bind = $mod, V, focusworkspaceoncurrentmonitor, name:V
bind = $mod, W, focusworkspaceoncurrentmonitor, name:W
bind = $mod, X, focusworkspaceoncurrentmonitor, name:X
bind = $mod, Y, focusworkspaceoncurrentmonitor, name:Y
bind = $mod, Z, focusworkspaceoncurrentmonitor, name:Z

# Move active window to letter workspace (doesn't follow)
bind = $mod SHIFT, A, movetoworkspace, name:A
bind = $mod SHIFT, B, movetoworkspace, name:B
bind = $mod SHIFT, C, movetoworkspace, name:C
bind = $mod SHIFT, D, movetoworkspace, name:D
bind = $mod SHIFT, E, movetoworkspace, name:E
bind = $mod SHIFT, F, movetoworkspace, name:F
bind = $mod SHIFT, G, movetoworkspace, name:G
bind = $mod SHIFT, H, movetoworkspace, name:H
# I/J/K/L skipped
# bind = $mod SHIFT, I, movetoworkspace, name:I
# bind = $mod SHIFT, J, movetoworkspace, name:J
# bind = $mod SHIFT, K, movetoworkspace, name:K
# bind = $mod SHIFT, L, movetoworkspace, name:L
bind = $mod SHIFT, M, movetoworkspace, name:M
bind = $mod SHIFT, N, movetoworkspace, name:N
bind = $mod SHIFT, O, movetoworkspace, name:O
bind = $mod SHIFT, P, movetoworkspace, name:P
bind = $mod SHIFT, Q, movetoworkspace, name:Q
bind = $mod SHIFT, R, movetoworkspace, name:R
bind = $mod SHIFT, S, movetoworkspace, name:S
bind = $mod SHIFT, T, movetoworkspace, name:T
bind = $mod SHIFT, U, movetoworkspace, name:U
bind = $mod SHIFT, V, movetoworkspace, name:V
bind = $mod SHIFT, W, movetoworkspace, name:W
bind = $mod SHIFT, X, movetoworkspace, name:X
bind = $mod SHIFT, Y, movetoworkspace, name:Y
bind = $mod SHIFT, Z, movetoworkspace, name:Z


# Back-and-forth (alt-tab) — 更接近“回到上一个 workspace”
bind = $mod, TAB, workspace, previous_per_monitor

# ---- AeroSpace-like focus (alt + j/k/i/l) ----
bind = $mod, J, movefocus, l
bind = $mod, K, movefocus, d
bind = $mod, I, movefocus, u
bind = $mod, L, movefocus, r

# ---- AeroSpace-like move (alt + shift + j/k/i/l) ----
bind = $mod SHIFT, J, movewindow, l
bind = $mod SHIFT, K, movewindow, d
bind = $mod SHIFT, I, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# ---- AeroSpace-like monitor switching (alt + arrows) ----
bind = $mod, left,  focusmonitor, l
bind = $mod, right, focusmonitor, r
bind = $mod, up,    focusmonitor, u
bind = $mod, down,  focusmonitor, d

# Move current workspace to monitor (alt + shift + arrows)
bind = $mod SHIFT, left,  movecurrentworkspacetomonitor, l
bind = $mod SHIFT, right, movecurrentworkspacetomonitor, r
bind = $mod SHIFT, up,    movecurrentworkspacetomonitor, u
bind = $mod SHIFT, down,  movecurrentworkspacetomonitor, d

# ===== Brightness =====
#binde = , XF86MonBrightnessUp,   exec, brightnessctl -d ddcci8 set +10%
#binde = , XF86MonBrightnessDown, exec, brightnessctl -d ddcci8 set 10%-
binde = , XF86MonBrightnessUp,   exec, sudo -n /usr/local/sbin/ddcci8-brightness up
binde = , XF86MonBrightnessDown, exec, sudo -n /usr/local/sbin/ddcci8-brightness down

# ===== Media (playerctl) =====
bind  = , XF86AudioPlay, exec, playerctl play-pause
bind  = , XF86AudioNext, exec, playerctl next
bind  = , XF86AudioPrev, exec, playerctl previous

# ===== Volume (PipeWire/WirePlumber via wpctl) =====
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# ---- Resize mode (submap) ----
# SUPER + - 进入 resize 模式（再按 ESC/Enter 退出）
bind = $mod, minus, submap, resize

submap = resize

# 大步调（按住可连发，用 binde）
binde = , J, resizeactive, -60 0
binde = , L, resizeactive,  60 0
binde = , K, resizeactive,  0 -60
binde = , I, resizeactive,  0  60

# 细调（Shift）

binde = SHIFT, J, resizeactive, -10 0
binde = SHIFT, L, resizeactive,  10 0
binde = SHIFT, K, resizeactive,  0 -10
binde = SHIFT, I, resizeactive,  0  10

# 也支持你说的 +/-（注意：+ 通常是 Shift+=）
binde = , minus, resizeactive, -60 0
binde = , equal, resizeactive,  60 0

# 退出 resize 模式
bind = , escape, submap, reset
bind = $mod, minus, submap, reset

submap = reset

# # --- Resize like AeroSpace: SUPER +/- ---
# # 宽度：SUPER - / SUPER +
# binde = $mod, minus, resizeactive, -40 0
# binde = $mod SHIFT, equal, resizeactive,  40 0   # Shift+= 就是 +

# # 高度：建议用 SUPER+ALT +/-（避免占用更多组合键）
# binde = $mod ALT, minus, resizeactive, 0 -40
# binde = $mod ALT SHIFT, equal, resizeactive, 0  40


# Monitors
## DP-only
bind = $mod, F1, exec, hyprctl --batch "keyword monitor DP-2,3440x1440@143.97501,0x0,1; keyword monitor HDMI-A-2,disable"
## HDMI-only
bind = $mod, F2, exec, hyprctl --batch "keyword monitor HDMI-A-2,3840x2160@60,0x0,1.67; keyword monitor DP-2,disable"
## Both
bind = $mod, F3, exec, hyprctl --batch "keyword monitor DP-2,3440x1440@143.97501,0x0,1; keyword monitor HDMI-A-2,3840x2160@60,auto-left,1.67"

# ---------- Input ----------
input {
  kb_layout = us
  follow_mouse = 1
  repeat_delay = 250
  repeat_rate = 20
  touchpad {
    natural_scroll = true
  }
}

cursor {
  no_hardware_cursors = false
}

xwayland {
  force_zero_scaling = true
}

general {
  gaps_in = 5
  gaps_out = 5
  border_size = 2
}

decoration {
  rounding = 10
  rounding_power = 2

  # active_opacity = 0.95
  inactive_opacity = 0.95

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }

  blur {
    enabled = true
    size = 3
    passes = 1

    vibrancy = 0.1696
  }
}

animation = workspaces, 1, 5, default
animation = windows, 1, 5, default, slide


# ---------- Window rules: pin apps to letter workspaces ----------
# Hyprland 新 windowrule 语法：match:* 是条件，workspace 是效果 :contentReference[oaicite:4]{index=4}
# 用 silent：应用打开时不会把你当前视角强行切走
windowrule = match:class ^(firefox|firefox-esr|org\\.mozilla\\.firefox)$, workspace name:X silent
windowrule = match:class ^(code|Code|code-oss|com\\.visualstudio\\.code)$, workspace name:V silent
windowrule = match:class ^(rstudio|RStudio|com\\.rstudio\\.desktop)$, workspace name:R silent
windowrule = match:class org.gnome.FileRoller, float on


# KeePassXC: 放到 special workspace，当作密码抽屉
windowrule = match:class ^org.keepassxc.KeePassXC$, workspace special:keepass
windowrule = match:class ^org.keepassxc.KeePassXC$, float on
windowrule = match:class ^org.keepassxc.KeePassXC$, center 1
windowrule = match:class ^org.keepassxc.KeePassXC$, size 70% 78%


